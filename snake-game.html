<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game 🐍</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    touch-action: none;
  }

  h1 {
    color: #39ff14;
    font-size: 1.6rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px #39ff14;
    margin-bottom: 8px;
  }

  #scoreboard {
    display: flex;
    gap: 30px;
    margin-bottom: 12px;
  }

  .score-box {
    text-align: center;
  }

  .score-label {
    color: #555;
    font-size: 0.65rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .score-value {
    color: #39ff14;
    font-size: 1.4rem;
    font-weight: bold;
    text-shadow: 0 0 10px #39ff14;
  }

  #gameCanvas {
    border: 2px solid #39ff14;
    box-shadow: 0 0 30px #39ff1466, inset 0 0 30px #00000088;
    border-radius: 4px;
    display: block;
  }

  #message {
    margin-top: 14px;
    color: #39ff14;
    font-size: 1rem;
    letter-spacing: 2px;
    text-align: center;
    text-shadow: 0 0 10px #39ff14;
    min-height: 24px;
  }

  /* D-Pad Controls */
  #dpad {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 52px 52px 52px;
    grid-template-rows: 52px 52px 52px;
    gap: 4px;
  }

  .dpad-btn {
    background: #111;
    border: 2px solid #39ff1466;
    border-radius: 8px;
    color: #39ff14;
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, box-shadow 0.1s;
  }

  .dpad-btn:active {
    background: #39ff1422;
    box-shadow: 0 0 12px #39ff1466;
  }

  .dpad-empty { background: transparent; border: none; }

  #restartBtn {
    margin-top: 16px;
    padding: 10px 30px;
    background: transparent;
    border: 2px solid #39ff14;
    color: #39ff14;
    font-size: 0.9rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    text-shadow: 0 0 8px #39ff14;
    box-shadow: 0 0 10px #39ff1433;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #restartBtn:active {
    background: #39ff1422;
    box-shadow: 0 0 20px #39ff14;
  }
</style>
</head>
<body>

<h1>🐍 Snake</h1>

<div id="scoreboard">
  <div class="score-box">
    <div class="score-label">Score</div>
    <div class="score-value" id="scoreVal">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Best</div>
    <div class="score-value" id="bestVal">0</div>
  </div>
  <div class="score-box">
    <div class="score-label">Level</div>
    <div class="score-value" id="levelVal">1</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="message">▶ Start करण्यासाठी खाली दाब</div>

<!-- D-Pad -->
<div id="dpad">
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="btnUp">▲</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="btnLeft">◄</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="btnRight">►</button>
  <div class="dpad-empty"></div>
  <button class="dpad-btn" id="btnDown">▼</button>
  <div class="dpad-empty"></div>
</div>

<button id="restartBtn">🔄 Restart</button>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Responsive canvas size
const maxSize = Math.min(window.innerWidth - 24, 320);
const CELL = 20;
const COLS = Math.floor(maxSize / CELL);
const ROWS = Math.floor(maxSize / CELL);
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, food, bonus, score, best, level, gameLoop, running, started;

best = 0;

function init() {
  const mid = Math.floor(COLS / 2);
  snake = [
    {x: mid, y: Math.floor(ROWS/2)},
    {x: mid-1, y: Math.floor(ROWS/2)},
    {x: mid-2, y: Math.floor(ROWS/2)},
  ];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  level = 1;
  running = false;
  started = false;
  bonus = null;
  placeFood();
  updateUI();
  draw();
  document.getElementById('message').textContent = '▶ Start करण्यासाठी खाली दाब';
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function placeBonus() {
  if (bonus) return;
  if (Math.random() < 0.3) {
    let pos;
    do {
      pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    } while (snake.some(s => s.x===pos.x && s.y===pos.y) || (food.x===pos.x && food.y===pos.y));
    bonus = pos;
    setTimeout(() => { bonus = null; draw(); }, 5000);
  }
}

function getSpeed() {
  return Math.max(80, 200 - (level - 1) * 20);
}

function startGame() {
  if (running) return;
  running = true;
  started = true;
  document.getElementById('message').textContent = '';
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    gameOver(); return;
  }
  // Self collision
  if (snake.some(s => s.x===head.x && s.y===head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);

  if (head.x===food.x && head.y===food.y) {
    score += 10 * level;
    if (score > best) best = score;
    if (score % 50 === 0) level++;
    placeFood();
    placeBonus();
    clearInterval(gameLoop);
    gameLoop = setInterval(tick, getSpeed());
  } else if (bonus && head.x===bonus.x && head.y===bonus.y) {
    score += 30 * level;
    if (score > best) best = score;
    bonus = null;
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function gameOver() {
  clearInterval(gameLoop);
  running = false;
  if (score > best) best = score;
  updateUI();
  draw();
  document.getElementById('message').textContent = `💀 Game Over! Score: ${score}`;
}

function updateUI() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('bestVal').textContent = best;
  document.getElementById('levelVal').textContent = level;
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid dots
  ctx.fillStyle = '#1a1a2e';
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillRect(x*CELL + CELL/2 - 1, y*CELL + CELL/2 - 1, 2, 2);
    }
  }

  // Food
  const foodX = food.x * CELL + CELL/2;
  const foodY = food.y * CELL + CELL/2;
  ctx.save();
  ctx.shadowColor = '#ff4444';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(foodX, foodY, CELL/2 - 2, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#fff';
  ctx.font = `${CELL-4}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🍎', foodX, foodY);

  // Bonus
  if (bonus) {
    const bx = bonus.x * CELL + CELL/2;
    const by = bonus.y * CELL + CELL/2;
    ctx.save();
    ctx.shadowColor = '#ffdd00';
    ctx.shadowBlur = 14;
    ctx.font = `${CELL-4}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('⭐', bx, by);
    ctx.restore();
  }

  // Snake
  snake.forEach((seg, i) => {
    const x = seg.x * CELL;
    const y = seg.y * CELL;
    const p = i / snake.length;
    const green = Math.floor(255 - p * 100);
    ctx.save();
    ctx.shadowColor = '#39ff14';
    ctx.shadowBlur = i === 0 ? 16 : 6;
    ctx.fillStyle = i === 0 ? '#39ff14' : `rgb(0, ${green}, 0)`;
    ctx.beginPath();
    ctx.roundRect(x+1, y+1, CELL-2, CELL-2, i===0 ? 6 : 3);
    ctx.fill();
    ctx.restore();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#000';
      const ex = dir.x === 1 ? x+CELL-5 : dir.x === -1 ? x+3 : x+4;
      const ey = dir.y === 1 ? y+CELL-5 : dir.y === -1 ? y+3 : y+4;
      const ex2 = dir.x === 0 ? x+CELL-4 : ex;
      const ey2 = dir.y === 0 ? y+CELL-4 : ey;
      ctx.beginPath(); ctx.arc(ex, ey, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 2, 0, Math.PI*2); ctx.fill();
    }
  });
}

// Controls
function setDir(dx, dy) {
  if (!started) startGame();
  if (dx === 1 && dir.x === -1) return;
  if (dx === -1 && dir.x === 1) return;
  if (dy === 1 && dir.y === -1) return;
  if (dy === -1 && dir.y === 1) return;
  nextDir = {x: dx, y: dy};
}

document.getElementById('btnUp').addEventListener('click', () => setDir(0,-1));
document.getElementById('btnDown').addEventListener('click', () => setDir(0,1));
document.getElementById('btnLeft').addEventListener('click', () => setDir(-1,0));
document.getElementById('btnRight').addEventListener('click', () => setDir(1,0));
document.getElementById('restartBtn').addEventListener('click', () => {
  clearInterval(gameLoop);
  init();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp') { e.preventDefault(); setDir(0,-1); }
  if (e.key==='ArrowDown') { e.preventDefault(); setDir(0,1); }
  if (e.key==='ArrowLeft') { e.preventDefault(); setDir(-1,0); }
  if (e.key==='ArrowRight') { e.preventDefault(); setDir(1,0); }
});

// Swipe
let tx=0, ty=0;
canvas.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (!started) startGame();
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  e.preventDefault();
}, {passive:false});

init();
</script>
</body>
</html>
